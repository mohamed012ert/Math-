<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR BRAIN ACADEMY - Student Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="./Imag/2.jpg" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://script.google.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBg: '#FAF8F0', // الخلفية العاجية الخاصة بالبراند
                        brandOrange: '#F28749',
                        brandTeal: '#51A3A3',
                    },
                    fontFamily: {
                        sans: ['Cairo', 'Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Cairo', 'Outfit', sans-serif; background-color: #FAF8F0; color: #1e293b; }
        
        /* تدرج الأيقونات المتبع في الهوية البصرية */
        .gradient-icon {
            background: linear-gradient(135deg, #F28749 0%, #51A3A3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px border-transparent;
            box-shadow: 0 4px 15px -3px rgba(81, 163, 163, 0.05);
            cursor: pointer;
            position: relative;
        }
        .content-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(242, 135, 73, 0.15);
            border-color: #51A3A3;
        }

        .fullscreen-app-view {
            position: fixed; inset: 0;
            background: black; z-index: 99999;
            display: none;
        }
        .fullscreen-app-view.active { display: block; }
        
        .filter-chip {
            padding: 8px 22px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
            background: white;
            color: #51A3A3;
            border: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .filter-chip.active {
            background: linear-gradient(135deg, #F28749 0%, #51A3A3 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(242, 135, 73, 0.2);
        }

        /* أنيميشن تحميل متوافق مع ألوان الأكاديمية */
        .skeleton {
            background: linear-gradient(90deg, #f4f2ea 25%, #eadecc 50%, #f4f2ea 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <nav class="bg-white/90 backdrop-blur-md border-b border-orange-100/50 px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border border-gray-100 shadow-sm">
                    <i class="fa-solid fa-brain gradient-icon text-xl"></i>
                </div>
                <div class="flex flex-col">
                    <span class="font-black text-base text-gray-800 tracking-tight">أكاديمية مستر برين</span>
                    <span class="text-[9px] font-bold tracking-widest text-brandOrange" dir="ltr">MR BRAIN ACADEMY</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right flex items-center gap-3 bg-brandBg/60 py-1 px-4 rounded-full border border-gray-100">
                    <div class="w-8 h-8 rounded-full bg-brandTeal/10 flex items-center justify-center text-brandTeal text-xs font-bold">
                        <i class="fa-solid fa-user-graduate"></i>
                    </div>
                    <div>
                        <p class="font-bold text-xs text-gray-700" id="studentName">الطالب</p>
                        <p class="text-[9px] text-brandOrange font-black uppercase tracking-wider" id="gradeBadge">Grade</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-9 h-9 flex items-center justify-center hover:bg-brandBg text-brandTeal rounded-xl transition" title="الرئيسية"><i class="fa-solid fa-house"></i></button>
                <a href="index.html" class="w-9 h-9 flex items-center justify-center hover:bg-red-50 text-red-500 rounded-xl transition" title="تسجيل الخروج"><i class="fa-solid fa-power-off"></i></a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 flex-grow w-full">
        
        <div id="subjectGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
            
            <div onclick="openSubject('Math')" class="bg-white border-2 border-gray-50 rounded-2xl p-6 flex items-center gap-5 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 border-r-4 border-r-brandOrange cursor-pointer group">
                <div class="w-16 h-16 bg-orange-50 text-brandOrange rounded-2xl flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-calculator"></i>
                </div>
                <div>
                    <h3 class="font-black text-xl text-gray-800">الرياضيات (Mathematics)</h3>
                    <p class="text-xs text-gray-400 mt-1">عرض جميع المحاضرات، المذكرات والاختبارات التفاعلية</p>
                </div>
                <i class="fa-solid fa-chevron-left text-gray-300 mr-auto group-hover:translate-x-[-4px] transition-transform"></i>
            </div>

            <div onclick="openSubject('Science')" class="bg-white border-2 border-gray-50 rounded-2xl p-6 flex items-center gap-5 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 border-r-4 border-r-brandTeal cursor-pointer group">
                <div class="w-16 h-16 bg-teal-50 text-brandTeal rounded-2xl flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-flask"></i>
                </div>
                <div>
                    <h3 class="font-black text-xl text-gray-800">العلوم (Science)</h3>
                    <p class="text-xs text-gray-400 mt-1">Biology, Chemistry & Physics Lectures</p>
                </div>
                <i class="fa-solid fa-chevron-left text-gray-300 mr-auto group-hover:translate-x-[-4px] transition-transform"></i>
            </div>
        </div>

        <div id="contentSection" class="hidden mt-8">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-8 bg-white p-5 rounded-2xl shadow-sm border border-gray-50">
                <div class="flex items-center gap-3">
                    <button onclick="location.reload()" class="text-brandTeal hover:text-brandOrange transition ml-1 text-lg"><i class="fa-solid fa-arrow-right"></i></button>
                    <h2 id="viewTitle" class="text-2xl font-black text-gray-800">Mathematics</h2>
                </div>
                <div class="flex gap-2 overflow-x-auto pb-2 lg:pb-0" style="scrollbar-width: none;">
                    <button onclick="applyFilter('all')" id="f-all" class="filter-chip active">الكل</button>
                    <button onclick="applyFilter('video')" id="f-video" class="filter-chip"><i class="fa-solid fa-circle-play text-xs ml-1.5"></i>الفيديوهات</button>
                    <button onclick="applyFilter('lesson')" id="f-lesson" class="filter-chip"><i class="fa-solid fa-file-pdf text-xs ml-1.5"></i>الملفات المذكرات</button>
                    <button onclick="applyFilter('quiz')" id="f-quiz" class="filter-chip"><i class="fa-solid fa-trophy text-xs ml-1.5"></i>الاختبارات</button>
                </div>
            </div>
            
            <div id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </div>
    </main>

    <footer class="text-center py-6 text-xs text-gray-400 bg-white border-t border-orange-50">
         حقوق النشر © 2026 أكاديمية <span class="text-brandOrange font-bold">Mr Brain</span> | تصميم وإشراف م/ محمد مصطفى
    </footer>

    <div id="appViewer" class="fullscreen-app-view">
        <button onclick="closeAppViewer()" class="back-btn absolute top-4 right-4 text-white z-50 bg-black/60 px-5 py-2.5 rounded-xl font-bold hover:bg-brandOrange transition shadow-lg flex items-center gap-2"> <i class="fa-solid fa-arrow-right"></i> عودة للمنصة</button>
        <iframe id="appIframe" src="" frameborder="0" allow="autoplay; fullscreen" loading="lazy" class="w-full h-full"></iframe>
    </div>

    <script>
        const user = JSON.parse(sessionStorage.getItem('academyUser'));
        if(!user) window.location.href = 'index.html';

        document.getElementById('studentName').innerText = user.name;
        document.getElementById('gradeBadge').innerText = "Grade " + user.grade;

        let allMaterials = [];
        const progressKey = `progress_${user.name}_${user.grade}`;

        async function openSubject(subj) {
            document.getElementById('subjectGrid').classList.add('hidden');
            document.getElementById('contentSection').classList.remove('hidden');
            document.getElementById('viewTitle').innerText = subj === 'Math' ? 'محاضرات الرياضيات' : 'محاضرات العلوم';

            const grid = document.getElementById('cardsGrid');
            
            // ✅ الـ Skeleton Loader المطور بألوان البراند أثناء التحميل
            grid.innerHTML = Array(6).fill(0).map(() => `
                <div class="bg-white p-5 rounded-2xl flex items-center gap-4 border border-gray-100 shadow-sm">
                    <div class="w-12 h-12 skeleton rounded-xl shrink-0"></div>
                    <div class="w-full space-y-2">
                        <div class="h-2.5 w-16 skeleton rounded-full"></div>
                        <div class="h-4 w-11/12 skeleton rounded-md"></div>
                    </div>
                </div>
            `).join('');

            try {
                // ✅ تعديل احترافي: جلب البيانات مباشرة من السيرفر وإضافة تيمبستامب لمنع كاش المتصفح الداخلي نهائياً لضمان الفورية
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getContent&grade=${user.grade}&subject=${subj}&student=${encodeURIComponent(user.name)}&_=${new Date().getTime()}`);
                allMaterials = await res.json();
                renderCards(allMaterials);
            } catch(e) {
                console.error("Error loading content:", e);
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-red-500 bg-white rounded-2xl shadow-sm border border-red-50"><i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i><p>عذراً، حدث خطأ أثناء تحميل البيانات. يرجى المحاولة مرة أخرى.</p></div>`;
            }
        }

        function applyFilter(type) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.getElementById('f-' + type).classList.add('active');
            const filtered = type === 'all' ? allMaterials : allMaterials.filter(m => m.type === type);
            renderCards(filtered);
        }

        function renderCards(list) {
            const grid = document.getElementById('cardsGrid');
            const progress = JSON.parse(localStorage.getItem(progressKey)) || [];

            if(list.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 bg-white rounded-2xl border border-gray-50"><i class="fa-regular fa-folder-open text-5xl mb-4 text-brandTeal/40"></i><p class="font-bold">لا يوجد محتوى متاح حالياً في هذا القسم.</p></div>`;
                return;
            }

            grid.innerHTML = list.map(item => {
                let iconClass = "bg-teal-50 text-brandTeal", icon = "fa-file-pdf", typeLabel = "مذكرة / ملف PDF";
                const isViewed = progress.includes(item.title + (item.content || item.data));
                
                if(item.type === 'video') { 
                    iconClass = "bg-orange-50 text-brandOrange"; icon = "fa-play"; typeLabel = "شرح فيديو"; 
                } else if(item.type === 'quiz') { 
                    iconClass = "bg-amber-50 text-amber-500"; icon = "fa-trophy"; typeLabel = "اختبار تقييمي"; 
                }

                let downloadBtn = (item.type === 'lesson') ? 
                    `<a href="${item.content || item.data}" target="_blank" onclick="event.stopPropagation();" class="mr-auto p-2.5 text-gray-400 hover:text-brandTeal bg-gray-50 hover:bg-teal-50 rounded-xl transition" title="تحميل الملف">
                        <i class="fa-solid fa-download"></i>
                    </a>` : '';

                return `
                <div onclick="launchViewer('${item.type}', '${item.content || item.data}', '${item.title}')" class="content-card">
                    <div class="w-12 h-12 ${iconClass} rounded-xl flex items-center justify-center text-lg shrink-0">
                        <i class="fa-solid ${icon}"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-0.5">${typeLabel}</p>
                        <h4 class="font-bold text-gray-800 text-sm truncate">
                            ${isViewed ? '<i class="fa-solid fa-circle-check text-emerald-500 ml-1"></i>' : ''} 
                            ${item.title}
                        </h4>
                    </div>
                    ${downloadBtn}
                </div>`;
            }).join('');
        }

        function launchViewer(type, url, title) {
            const modal = document.getElementById('appViewer');
            const iframe = document.getElementById('appIframe');
            let finalUrl = "";

            saveProgress(title + url);

            if(type === 'video') {
                if(url.includes("youtube.com") || url.includes("youtu.be")) {
                    const vidId = getYoutubeId(url);
                    finalUrl = `https://www.youtube.com/embed/${vidId}?autoplay=1&rel=0&modestbranding=1`;
                } else if(url.includes("drive.google.com")) {
                    finalUrl = url.replace(/\/view.*/, '/preview');
                } else { finalUrl = url; }
            } else if(type === 'lesson') {
                finalUrl = url.includes("drive.google.com") ? url.replace(/\/view.*/, '/preview') : url;
            } else if(type === 'quiz') {
                finalUrl = url.includes("?") ? url + "&embedded=true" : url + "?embedded=true";
            } else { finalUrl = url; }

            iframe.src = finalUrl;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            renderCards(allMaterials);
        }

        function saveProgress(id) {
            let progress = JSON.parse(localStorage.getItem(progressKey)) || [];
            if(!progress.includes(id)) {
                progress.push(id);
                localStorage.setItem(progressKey, JSON.stringify(progress));
            }
        }

        function closeAppViewer() {
            document.getElementById('appViewer').classList.remove('active');
            document.getElementById('appIframe').src = "";
            document.body.style.overflow = 'auto';
        }

        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
